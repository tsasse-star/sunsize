  const [location, setLocation] = useState("yaounde");
  const [customPsh, setCustomPsh] = useState(4.5);
  const [worstMonth, setWorstMonth] = useState(true);
  const [autonomyDays, setAutonomyDays] = useState(3);
  const [systemVoltage, setSystemVoltage] = useState(12);
  const [batteryType, setBatteryType] = useState("lithium");
  const [systemEff, setSystemEff] = useState(85);
  const [nbLights, setNbLights] = useState(1);

  const loc = LOCATIONS[location];
  const monthlyPsh = loc ? loc.psh : null;
  const avgPsh = monthlyPsh ? monthlyPsh.reduce((a, b) => a + b, 0) / 12 : Number(customPsh);
  const minPsh = monthlyPsh ? Math.min(...monthlyPsh) : Number(customPsh);
  const pshUsed = location === "custom" ? Number(customPsh) : worstMonth ? minPsh : avgPsh;

  const battPreset = BATTERIES[batteryType];
  const dod = battPreset.dod;

  const effectiveLoadW = lampW * (dimmingRatio / 100);
  const nightlyEnergyWh = effectiveLoadW * hoursPerNight;

  const panelWpRaw = pshUsed > 0 ? nightlyEnergyWh / (pshUsed * (systemEff / 100)) : 0;
  const panelWp = roundUpTo(panelWpRaw, STREETLIGHT_PANEL_SIZES);

  const battAhRaw = systemVoltage > 0 && dod > 0 ? (nightlyEnergyWh * autonomyDays) / (systemVoltage * (dod / 100) * (systemEff / 100)) : 0;
  const battKwh = (battAhRaw * systemVoltage) / 1000;

  const totalPanelWp = panelWp * nbLights;
  const totalBattKwh = battKwh * nbLights;

  return (
    <div className="ssa-card-stack">
      <section className="ssa-card">
        <h2>Lampadaire à alimenter</h2>
        <div className="ssa-field-grid">
          <label className="ssa-field">
            <span>Puissance de la lampe LED (W)</span>
            <input type="number" min="5" value={lampW} onChange={(e) => setLampW(Number(e.target.value))} />
          </label>
          <label className="ssa-field">
            <span>Heures d'éclairage par nuit</span>
            <input type="number" min="1" max="14" value={hoursPerNight} onChange={(e) => setHoursPerNight(Number(e.target.value))} />
          </label>
          <label className="ssa-field">
            <span>Intensité moyenne sur la nuit (%)</span>
            <input type="number" min="30" max="100" value={dimmingRatio} onChange={(e) => setDimmingRatio(Number(e.target.value))} />
          </label>
          <label className="ssa-field">
            <span>Nombre de lampadaires identiques</span>
            <input type="number" min="1" value={nbLights} onChange={(e) => setNbLights(Number(e.target.value))} />
          </label>
        </div>
        <p className="ssa-hint">L'intensité moyenne permet de tenir compte d'une gradation (ex. 100 % en début de nuit, 50 % après minuit, détection de présence…).</p>
      </section>

      <section className="ssa-card">
        <h2>Site & autonomie</h2>
        <div className="ssa-field-grid">
          <label className="ssa-field">
            <span>Localisation (irradiation)</span>
            <select value={location} onChange={(e) => setLocation(e.target.value)}>
              {Object.entries(LOCATIONS).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
              <option value="custom">Personnalisé</option>
            </select>
          </label>
          {location === "custom" ? (
            <label className="ssa-field">
              <span>Irradiation moyenne (kWh/m²/j)</span>
              <input type="number" min="1" step="0.1" value={customPsh} onChange={(e) => setCustomPsh(Number(e.target.value))} />
            </label>
          ) : (
            <label className="ssa-check-line">
              <input type="checkbox" checked={worstMonth} onChange={(e) => setWorstMonth(e.target.checked)} />
              Dimensionner sur le mois le plus défavorable
            </label>
          )}
          <label className="ssa-field">
            <span>Autonomie sans soleil (jours)</span>
            <input type="number" min="1" max="7" value={autonomyDays} onChange={(e) => setAutonomyDays(Number(e.target.value))} />
          </label>
          <label className="ssa-field">
            <span>Tension du système (V)</span>
            <select value={systemVoltage} onChange={(e) => setSystemVoltage(Number(e.target.value))}>
              <option value={12}>12 V</option>
              <option value={24}>24 V</option>
            </select>
          </label>
          <label className="ssa-field">
            <span>Type de batterie</span>
            <select value={batteryType} onChange={(e) => setBatteryType(e.target.value)}>
              {Object.entries(BATTERIES).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
            </select>
          </label>
          <label className="ssa-field">
            <span>Rendement global du système (%)</span>
            <input type="number" min="60" max="100" value={systemEff} onChange={(e) => setSystemEff(Number(e.target.value))} />
          </label>
        </div>
      </section>

      <section className="ssa-card ssa-result-card accent-sun">
        <h3>Dimensionnement par lampadaire</h3>
        <div className="ssa-row"><span>Énergie consommée par nuit</span><span className="ssa-mono">{fmt(nightlyEnergyWh)} Wh</span></div>
        <div className="ssa-row"><span>Panneau solaire recommandé</span><span className="ssa-mono">{fmt(panelWp)} Wc</span></div>
        <div className="ssa-row"><span>Batterie recommandée</span><span className="ssa-mono">{fmt(battAhRaw)} Ah ({systemVoltage} V) — {fmt(battKwh, 2)} kWh</span></div>
      </section>

      {nbLights > 1 && (
        <section className="ssa-card ssa-result-card accent-electric">
          <h3>Total pour {nbLights} lampadaires</h3>
          <div className="ssa-row"><span>Puissance PV totale</span><span className="ssa-mono">{fmt(totalPanelWp)} Wc</span></div>
          <div className="ssa-row"><span>Capacité batterie totale</span><span className="ssa-mono">{fmt(totalBattKwh, 2)} kWh</span></div>
        </section>
      )}

      <p className="ssa-disclaimer">
        Kit tout-en-un (panneau + batterie + LED intégrés) ou installation séparée : dans les deux cas, dimensionnez sur le mois le plus défavorable
        pour garantir l'éclairage toute l'année.
      </p>
    </div>
  );
}

/* ============================= ROI & FINANCEMENT ============================= */

function ROITool() {
  const [installCost, setInstallCost] = useState(3500000);
  const [monthlySavings, setMonthlySavings] = useState(60000);
  const [lifespanYears, setLifespanYears] = useState(20);
  const [tariffEscalation, setTariffEscalation] = useState(4);
  const [maintenancePctYear, setMaintenancePctYear] = useState(1);

  const [creditRate, setCreditRate] = useState(12);
  const [creditMonths, setCreditMonths] = useState(36);
  const [downPaymentPct, setDownPaymentPct] = useState(20);

  const [leaseMonthly, setLeaseMonthly] = useState(90000);
  const [leaseMonths, setLeaseMonths] = useState(48);
  const [leaseResidual, setLeaseResidual] = useState(300000);

  // --- Cash ---
  const paybackMonthsCash = monthlySavings > 0 ? installCost / monthlySavings : 0;
  let cumulative = 0, totalSavingsCash = 0, currentMonthly = monthlySavings;
  const totalMonths = lifespanYears * 12;
  for (let y = 0; y < lifespanYears; y++) {
    totalSavingsCash += currentMonthly * 12;
    currentMonthly *= 1 + tariffEscalation / 100;
  }
  const maintenanceTotal = installCost * (maintenancePctYear / 100) * lifespanYears;
  const netGainCash = totalSavingsCash - installCost - maintenanceTotal;

  // --- Crédit ---
  const downPayment = installCost * (downPaymentPct / 100);
  const loanAmount = installCost - downPayment;
  const r = creditRate / 100 / 12;
  const n = creditMonths;
  const monthlyPayment = r > 0 ? (loanAmount * r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1) : loanAmount / n;
  const netMonthlyDuringLoan = monthlySavings - monthlyPayment;
  const totalPaidCredit = downPayment + monthlyPayment * n;
  const totalInterest = totalPaidCredit - installCost;

  // --- Leasing ---
  const netMonthlyLease = monthlySavings - leaseMonthly;
  const totalPaidLease = leaseMonthly * leaseMonths + Number(leaseResidual);

  return (
    <div className="ssa-card-stack">
      <section className="ssa-card">
        <h2>Investissement & économies</h2>
        <div className="ssa-field-grid">
          <label className="ssa-field">
            <span>Coût total de l'installation</span>
            <input type="number" min="0" value={installCost} onChange={(e) => setInstallCost(Number(e.target.value))} />
          </label>
          <label className="ssa-field">
            <span>Économie mensuelle estimée (facture évitée)</span>
            <input type="number" min="0" value={monthlySavings} onChange={(e) => setMonthlySavings(Number(e.target.value))} />
          </label>
          <label className="ssa-field">
            <span>Durée de vie du système (années)</span>
            <input type="number" min="1" max="30" value={lifespanYears} onChange={(e) => setLifespanYears(Number(e.target.value))} />
          </label>
          <label className="ssa-field">
            <span>Hausse annuelle du tarif électrique évité (%)</span>
            <input type="number" min="0" max="20" value={tariffEscalation} onChange={(e) => setTariffEscalation(Number(e.target.value))} />
          </label>
          <label className="ssa-field">
            <span>Maintenance annuelle (% du coût initial)</span>
            <input type="number" min="0" max="10" step="0.5" value={maintenancePctYear} onChange={(e) => setMaintenancePctYear(Number(e.target.value))} />
          </label>
        </div>
      </section>

      <section className="ssa-card">
        <h2>Scénario crédit</h2>
        <div className="ssa-field-grid">
          <label className="ssa-field">
            <span>Apport initial (%)</span>
            <input type="number" min="0" max="100" value={downPaymentPct} onChange={(e) => setDownPaymentPct(Number(e.target.value))} />
          </label>
          <label className="ssa-field">
            <span>Taux d'intérêt annuel (%)</span>
            <input type="number" min="0" max="40" step="0.5" value={creditRate} onChange={(e) => setCreditRate(Number(e.target.value))} />
          </label>
          <label className="ssa-field">
            <span>Durée du crédit (mois)</span>
            <input type="number" min="6" max="120" value={creditMonths} onChange={(e) => setCreditMonths(Number(e.target.value))} />
          </label>
        </div>
      </section>

      <section className="ssa-card">
        <h2>Scénario leasing</h2>
        <div className="ssa-field-grid">
          <label className="ssa-field">
            <span>Loyer mensuel</span>
            <input type="number" min="0" value={leaseMonthly} onChange={(e) => setLeaseMonthly(Number(e.target.value))} />
          </label>
          <label className="ssa-field">
            <span>Durée du bail (mois)</span>
            <input type="number" min="6" max="120" value={leaseMonths} onChange={(e) => setLeaseMonths(Number(e.target.value))} />
          </label>
          <label className="ssa-field">
            <span>Valeur résiduelle de rachat</span>
            <input type="number" min="0" value={leaseResidual} onChange={(e) => setLeaseResidual(Number(e.target.value))} />
          </label>
        </div>
      </section>

      <section className="ssa-card ssa-result-card accent-sun">
        <h3>Comptant</h3>
        <div className="ssa-row"><span>Seuil de rentabilité</span><span className="ssa-mono">{fmt(paybackMonthsCash, 1)} mois</span></div>
        <div className="ssa-row"><span>Économies cumulées sur {lifespanYears} ans</span><span className="ssa-mono">{fmt(totalSavingsCash)}</span></div>
        <div className="ssa-row"><span>Maintenance cumulée</span><span className="ssa-mono">-{fmt(maintenanceTotal)}</span></div>
        <div className="ssa-row"><span>Gain net sur la durée de vie</span><span className="ssa-mono">{fmt(netGainCash)}</span></div>
      </section>

      <section className="ssa-card ssa-result-card accent-electric">
        <h3>Crédit ({creditMonths} mois, {creditRate}&nbsp;%)</h3>
        <div className="ssa-row"><span>Apport initial</span><span className="ssa-mono">{fmt(downPayment)}</span></div>
        <div className="ssa-row"><span>Mensualité</span><span className="ssa-mono">{fmt(monthlyPayment)}</span></div>
        <div className="ssa-row"><span>Trésorerie nette / mois pendant le crédit</span><span className="ssa-mono">{fmt(netMonthlyDuringLoan)}</span></div>
        <div className="ssa-row"><span>Coût total (apport + mensualités)</span><span className="ssa-mono">{fmt(totalPaidCredit)}</span></div>
        <div className="ssa-row"><span>Intérêts payés au total</span><span className="ssa-mono">{fmt(totalInterest)}</span></div>
      </section>

      <section className="ssa-card ssa-result-card accent-warn">
        <h3>Leasing ({leaseMonths} mois)</h3>
        <div className="ssa-row"><span>Trésorerie nette / mois pendant le bail</span><span className="ssa-mono">{fmt(netMonthlyLease)}</span></div>
        <div className="ssa-row"><span>Coût total (loyers + rachat résiduel)</span><span className="ssa-mono">{fmt(totalPaidLease)}</span></div>
        <p className="ssa-hint">
          {netMonthlyLease >= 0
            ? "L'économie mensuelle couvre déjà le loyer : trésorerie positive dès le premier mois."
            : "Le loyer dépasse l'économie mensuelle : le client paie un supplément chaque mois jusqu'au rachat."}
        </p>
      </section>

      <p className="ssa-disclaimer">
        Comparatif simplifié à but indicatif : il ne remplace pas un plan de financement établi avec l'organisme prêteur ou le loueur,
        qui peut inclure assurances, frais de dossier ou clauses spécifiques. Les hausses tarifaires futures restent des hypothèses.
      </p>
    </div>
  );
}

.ssa-mini-steps-list strong { font-family: 'Rajdhani', sans-serif; font-size: 0.92rem; display: block; margin-bottom: 0.15rem; }
.ssa-mini-steps-list p { margin: 0; font-size: 0.8rem; color: var(--text-muted); line-height: 1.4; }

.ssa-empty { text-align: center; color: var(--text-muted); }
.ssa-empty h2 { color: var(--text); }

.ssa-toggle { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
.ssa-toggle input { opacity: 0; width: 100%; height: 100%; position: absolute; margin: 0; cursor: pointer; z-index: 1; }
.ssa-toggle span {
  position: absolute; inset: 0; background: var(--surface-2); border-radius: 999px; border: 1px solid var(--border);
  transition: background 0.15s;
}
.ssa-toggle span::after {
  content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px;
  background: var(--text-muted); border-radius: 50%; transition: transform 0.15s, background 0.15s;
}
.ssa-toggle input:checked + span { background: rgba(242,169,60,0.25); }
.ssa-toggle input:checked + span::after { transform: translateX(18px); background: var(--accent-sun); }

.ssa-table { display: flex; flex-direction: column; gap: 0.35rem; margin-bottom: 0.6rem; }
.ssa-table-row {
  display: grid; grid-template-columns: 1.6fr 0.7fr 0.5fr 0.6fr 0.7fr auto;
  gap: 0.35rem; align-items: center;
}
.ssa-table-row.head { font-size: 0.68rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
.ssa-table-row input {
  width: 100%; background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); padding: 0.4rem 0.35rem; font-size: 0.82rem; font-family: 'Inter', sans-serif;
}
.ssa-icon-btn {
  background: transparent; border: none; color: var(--accent-warn); cursor: pointer; font-size: 0.9rem; padding: 0.2rem;
}

.ssa-chips { display: flex; flex-wrap: wrap; gap: 0.4rem; margin: 0.7rem 0; }
.ssa-chip {
  background: var(--surface-2); border: 1px solid var(--border); color: var(--text-muted);
  border-radius: 999px; padding: 0.35rem 0.7rem; font-size: 0.75rem; cursor: pointer;
}
.ssa-chip:hover { border-color: var(--accent-sun); color: var(--text); }

.ssa-total-line { font-size: 0.85rem; color: var(--text-muted); margin: 0.3rem 0 0; }
.ssa-mono { font-family: 'IBM Plex Mono', monospace; color: var(--text); }

.ssa-field-grid { display: grid; grid-template-columns: 1fr; gap: 0.75rem; }
.ssa-field { display: flex; flex-direction: column; gap: 0.3rem; font-size: 0.82rem; color: var(--text-muted); }
.ssa-field select, .ssa-field input[type="number"] {
  background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); padding: 0.55rem 0.6rem; font-size: 0.88rem; font-family: 'Inter', sans-serif;
}
.ssa-field input[type="range"] { accent-color: var(--accent-sun); width: 100%; }

.ssa-hint { font-size: 0.75rem; color: var(--text-muted); margin: 0.4rem 0 0; line-height: 1.4; }
.ssa-check-line { display: flex; align-items: center; gap: 0.5rem; font-size: 0.82rem; margin: 0.6rem 0; color: var(--text-muted); }

.ssa-summary-band {
  position: sticky; bottom: 76px; z-index: 5;
  background: var(--surface-2); border: 1px solid var(--accent-sun);
  border-radius: 10px; padding: 0.7rem 1rem;
  display: flex; align-items: center; justify-content: space-between; font-size: 0.85rem;
}
.ssa-summary-band strong { font-size: 0.95rem; }
.ssa-summary-band small { color: var(--text-muted); font-weight: 400; }

.ssa-chart { display: flex; align-items: flex-end; gap: 0.35rem; height: 110px; margin-bottom: 0.5rem; }
.ssa-chart-col { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; }
.ssa-chart-bar-wrap { flex: 1; display: flex; align-items: flex-end; width: 100%; }
.ssa-chart-bar { width: 100%; background: var(--accent-sun); border-radius: 3px 3px 0 0; opacity: 0.85; min-height: 3px; }
.ssa-chart-bar.min { background: var(--accent-warn); opacity: 1; }
.ssa-chart-label { font-size: 0.6rem; color: var(--text-muted); margin-top: 0.3rem; }
.ssa-inline-stats { display: flex; justify-content: space-between; font-size: 0.78rem; color: var(--text-muted); margin-bottom: 0.5rem; }

.ssa-results-grid { display: grid; grid-template-columns: 1fr; gap: 0.85rem; }
.ssa-result-card { border-left: 3px solid var(--border); }
.ssa-result-card.accent-sun { border-left-color: var(--accent-sun); }
.ssa-result-card.accent-electric { border-left-color: var(--accent-electric); }
.ssa-row { display: flex; justify-content: space-between; gap: 0.5rem; font-size: 0.84rem; padding: 0.3rem 0; border-bottom: 1px dashed var(--border); }
.ssa-row:last-of-type { border-bottom: none; }
.ssa-row span:first-child { color: var(--text-muted); }

.ssa-sld-card { overflow-x: auto; }
.ssa-sld { width: 100%; min-width: 620px; height: auto; }
.ssa-sld-line { stroke: var(--accent-sun); stroke-width: 2; stroke-dasharray: 5 5; fill: none; animation: ssaFlow 1.2s linear infinite; }
@keyframes ssaFlow { to { stroke-dashoffset: -20; } }
.ssa-sld-sun { fill: var(--accent-sun); opacity: 0.9; }
.ssa-sld-node { fill: var(--surface-2); stroke: var(--border); stroke-width: 1; }
.ssa-sld-node.sun { stroke: var(--accent-sun); }
.ssa-sld-node.electric { stroke: var(--accent-electric); }
.ssa-sld-value { fill: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; }
.ssa-sld-label { fill: var(--text-muted); font-family: 'Inter', sans-serif; font-size: 11px; }

.ssa-disclaimer { font-size: 0.72rem; color: var(--text-muted); line-height: 1.5; padding: 0 0.25rem; }

.ssa-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  max-width: 640px; margin: 0 auto;
  background: var(--surface); border-top: 1px solid var(--border);
  padding: 0.7rem 1rem; display: flex; align-items: center; justify-content: space-between; gap: 0.5rem;
  backdrop-filter: blur(6px);
}
.ssa-nav-summary { font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; color: var(--accent-sun); }
.ssa-btn {
  border-radius: 8px; padding: 0.6rem 1rem; font-size: 0.85rem; font-weight: 600; cursor: pointer;
  font-family: 'Inter', sans-serif; border: 1px solid transparent;
}
.ssa-btn.primary { background: linear-gradient(180deg, var(--accent-sun), var(--accent-sun-deep)); color: #1a1305; }
.ssa-btn.ghost { background: transparent; border-color: var(--border); color: var(--text-muted); }
.ssa-btn.ghost:disabled { opacity: 0.4; cursor: default; }
.ssa-btn.subtle { background: var(--surface-2); color: var(--text); border-color: var(--border); align-self: flex-start; }

@media (min-width: 560px) {
  .ssa-field-grid { grid-template-columns: 1fr 1fr; }
  .ssa-results-grid { grid-template-columns: 1fr 1fr; }
  .ssa-hero-title { font-size: 2rem; }
}

@media (prefers-reduced-motion: reduce) {
  .ssa-sld-line { animation: none; }
}

/* ---------- Printable devis (letterhead) ---------- */
.ssa-print-sheet { display: none; }
.ssa-print-head { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 2px solid #1a1305; padding-bottom: 12px; margin-bottom: 18px; }
.ssa-print-brand { display: flex; gap: 12px; align-items: center; }
.ssa-print-brand strong { display: block; font-family: 'Rajdhani', sans-serif; font-size: 1.4rem; }
.ssa-print-brand span { display: block; font-size: 0.75rem; color: #555; }
.ssa-print-meta { text-align: right; font-size: 0.78rem; }
.ssa-print-meta div { margin-bottom: 3px; }
.ssa-print-meta span { color: #666; margin-right: 6px; }
.ssa-print-client { display: flex; gap: 28px; margin-bottom: 18px; font-size: 0.86rem; flex-wrap: wrap; }
.ssa-print-client span { display: block; color: #666; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 2px; }
.ssa-print-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-bottom: 18px; }
.ssa-print-table th, .ssa-print-table td { border: 1px solid #ccc; padding: 7px 9px; text-align: left; }
.ssa-print-table th { background: #f2f2f2; }
.ssa-print-table td:nth-child(2), .ssa-print-table td:nth-child(3), .ssa-print-table td:nth-child(4),
.ssa-print-table th:nth-child(2), .ssa-print-table th:nth-child(3), .ssa-print-table th:nth-child(4) { text-align: right; }
.ssa-print-totals { margin-left: auto; width: 280px; font-size: 0.85rem; }
.ssa-print-totals div { display: flex; justify-content: space-between; padding: 3px 0; }
.ssa-print-grand { border-top: 2px solid #1a1305; font-size: 1.05rem; margin-top: 5px; padding-top: 7px !important; }
.ssa-print-sign { display: flex; justify-content: space-between; margin-top: 56px; gap: 40px; }
.ssa-print-sign > div { flex: 1; font-size: 0.8rem; }
.ssa-sign-line { border-bottom: 1px solid #999; height: 46px; margin-top: 10px; }
.ssa-print-foot { font-size: 0.68rem; color: #666; margin-top: 26px; line-height: 1.5; }

@media print {
  html, body { background: #fff; }
  body * { visibility: hidden; }
  .ssa-print-sheet, .ssa-print-sheet * { visibility: visible; }
  .ssa-print-sheet {
    display: block; position: absolute; left: 0; top: 0; width: 100%;
    padding: 10mm; color: #111; background: #fff;
  }
}
`;


ReactDOM.createRoot(document.getElementById("root")).render(<SolarSizingApp />);
